<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Modul 5 - Bootstrap</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">

    <style>
        /* Tambahan style agar grid terlihat batasnya */
        .row div {
            border: 1px solid #ccc;
            background-color: #f8f9fa;
            padding: 10px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    
    <h2 class="mb-3">2. Bootstrap Grid</h2>
    <div class="row">
        <div class="col-12 col-md-8">.col-12 .col-md-8</div>
        <div class="col-6 col-md-4">.col-6 .col-md-4</div>
    </div>
    
    <div class="row">
        <div class="col-6 col-md-4">.col-6 .col-md-4</div>
        <div class="col-6 col-md-4">.col-6 .col-md-4</div>
        <div class="col-6 col-md-4">.col-6 .col-md-4</div>
    </div>

    <div class="row">
        <div class="col-6">.col-6</div>
        <div class="col-6">.col-6</div>
    </div>

    <hr class="my-5">

    <h2 class="mb-3">3. Bootstrap Table</h2>
    <table class="table table-hover">
        <thead>
            <tr>
                <th scope="col">#</th>
                <th scope="col">Nama Lengkap</th>
                <th scope="col">Asal Kota</th>
                <th scope="col">Umur</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="row">1</th>
                <td>Budi Rojadi</td>
                <td>Semarang</td>
                <td>35 th</td>
            </tr>
            <tr>
                <th scope="row">2</th>
                <td>Yulia Santi</td>
                <td>Bekasi</td>
                <td>32 th</td>
            </tr>
            <tr>
                <th scope="row">3</th>
                <td>Fahri Abdilah</td>
                <td>Medan</td>
                <td>38 th</td>
            </tr>
        </tbody>
    </table>

    <hr class="my-5">

    <div class="mb-5">
        <h2>4. Thumbnail & Fluid</h2>
        <img src="https://www.w3schools.com/bootstrap4/cinqueterre.jpg" class="img-thumbnail" alt="Cinque Terre" width="300">
        <img src="https://www.w3schools.com/bootstrap4/cinqueterre.jpg" class="img-fluid d-block mt-3" alt="Responsive image">
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js" integrity="sha256-2Pmvv0kuTBOenSvLm6bvfBSSHrUJ+3A7x6P5Ebd07/g=" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>

</body>
</html>
